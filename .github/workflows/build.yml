name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

env:
  DOCKER_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/ctbrec-alpine
  CTBVER_DEFAULT: 26.5.20

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          if [[ ${{ github.ref }} =~ ^refs/tags/v ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          elif [[ ${{ github.ref }} == refs/heads/main ]] && [[ ${{ github.event_name }} == push ]]; then
            VERSION=latest
          else
            VERSION=${{ env.CTBVER_DEFAULT }}
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Set CTBVER
        id: ctbver
        run: |
          if [[ ${{ steps.version.outputs.VERSION }} == latest ]]; then
            CTBVER=${{ env.CTBVER_DEFAULT }}
          else
            CTBVER=${{ steps.version.outputs.VERSION }}
          fi
          echo "CTBVER=$CTBVER" >> $GITHUB_OUTPUT

      - name: Build and push amd64
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}
            ${{ steps.version.outputs.VERSION != 'latest' && format('{0}:latest', env.DOCKER_IMAGE_NAME) || '' }}
          build-args: |
            CTBVER=${{ steps.ctbver.outputs.CTBVER }}

      - name: Build and push arm64
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}-arm64
            ${{ steps.version.outputs.VERSION != 'latest' && format('{0}:latest-arm64', env.DOCKER_IMAGE_NAME) || '' }}
          build-args: |
            CTBVER=${{ steps.ctbver.outputs.CTBVER }}

      - name: Build for PR (no push)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ env.DOCKER_IMAGE_NAME }}:pr-test
          build-args: |
            CTBVER=${{ steps.ctbver.outputs.CTBVER }}